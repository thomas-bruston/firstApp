<div class="max-w-2xl mx-auto space-y-6">

  <!-- En-tête -->
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-900">
      {{ isEditMode ? 'Modifier le produit' : 'Nouveau produit' }}
    </h1>
    <a routerLink="/products" class="text-sm text-gray-500 hover:text-gray-700">
      ← Annuler
    </a>
  </div>

  <!-- Formulaire -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4">

    <!-- Titre -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">Titre</label>
      <input formControlName="title" placeholder="Ex: iPhone 15" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" [class.border-danger-500]="titleError" [class.border-gray-300]="!titleError" />
      @if (titleError) {
        <p class="text-xs text-danger-500">{{ titleError }}</p>
      }
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">Description</label>
      <textarea formControlName="description" placeholder="Description du produit..." rows="3" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" [class.border-danger-500]="descriptionError" [class.border-gray-300]="!descriptionError"></textarea>
      @if (descriptionError) {
        <p class="text-xs text-danger-500">{{ descriptionError }}</p>
      }
    </div>

    <!-- Prix et Stock -->
    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Prix</label>
        <input formControlName="price" type="number" placeholder="Ex: 999" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" [class.border-danger-500]="priceError" [class.border-gray-300]="!priceError" />
        @if (priceError) {
          <p class="text-xs text-danger-500">{{ priceError }}</p>
        }
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-gray-700">Stock</label>
        <input formControlName="stock" type="number" placeholder="Ex: 50" class="w-full rounded-lg border px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" />
      </div>
    </div>

    <!-- Catégorie -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">Catégorie</label>
      <input formControlName="category" placeholder="Ex: smartphones" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" />
    </div>

    <!-- Thumbnail -->
    <div class="flex flex-col gap-1">
      <label class="text-sm font-medium text-gray-700">Image URL</label>
      <input formControlName="thumbnail" placeholder="https://..." class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:border-primary-500 focus:ring-primary-100" />
    </div>

    <!-- Boutons -->
    <div class="flex gap-3 pt-2">
      <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg font-medium hover:bg-primary-700 transition-colors">
        {{ isEditMode ? 'Enregistrer' : 'Créer' }}
      </button>
      <a routerLink="/products" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg font-medium hover:bg-gray-200 transition-colors">
        Annuler
      </a>
    </div>

  </form>

</div>
